name: Build and push Docker image
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: pod
            rolling: latest
          - target: serverless
            rolling: serverless

    steps:
      - uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force
          df -h

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      # Produces:
      #   Immutable per-commit:   <target>-<short-sha>        (every push)
      #   Immutable semver:       <target>-vX.Y.Z             (on git tag vX.Y.Z)
      #                           <target>-vX.Y               (on git tag vX.Y.Z)
      #   Rolling (main only):    latest | serverless
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=sha,prefix=${{ matrix.target }}-,format=short
            type=semver,prefix=${{ matrix.target }}-,pattern={{version}}
            type=semver,prefix=${{ matrix.target }}-,pattern={{major}}.{{minor}}
            type=raw,value=${{ matrix.rolling }},enable={{is_default_branch}}

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache-${{ matrix.target }}
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache-pod
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache-serverless
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ matrix.rolling }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache-${{ matrix.target }},mode=max,compression=zstd,image-manifest=true,oci-mediatypes=true
          provenance: false
