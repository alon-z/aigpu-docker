name: Build and push Docker image
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force
          df -h

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      # Build pod first so comfy-builder/aitoolkit-builder stages land in the
      # shared buildcache. The serverless build then reuses comfy-builder.
      - name: Build and push pod image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: pod
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache,mode=max,compression=zstd,image-manifest=true,oci-mediatypes=true
          provenance: false

      - name: Build and push serverless image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: serverless
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:serverless
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:serverless
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache,mode=max,compression=zstd,image-manifest=true,oci-mediatypes=true
          provenance: false
