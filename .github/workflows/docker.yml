name: Build and push Docker image
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: pod
            tag: latest
          - target: serverless
            tag: serverless

    steps:
      - uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force
          df -h

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      # Matrix jobs run in parallel. Each target writes to its own buildcache
      # tag and reads from both, so the shared comfy-builder stage compiled by
      # a previous run is reused by both targets on subsequent runs.
      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ matrix.tag }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache-${{ matrix.target }}
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache-pod
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache-serverless
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ matrix.tag }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache-${{ matrix.target }},mode=max,compression=zstd,image-manifest=true,oci-mediatypes=true
          provenance: false
